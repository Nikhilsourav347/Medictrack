name: meditrack
description: "MediTrack — Personal Health Tracking App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3+1
  path: ^1.9.0
  go_router: ^14.2.7
  fl_chart: ^0.68.0
  pdf: ^3.11.1
  printing: ^5.13.1
  url_launcher: ^6.3.0
  share_plus: ^12.0.2
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  flutter_contacts: ^1.1.9


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"

flutter_native_splash:
  color: "#ffffff"
  image: "assets/images/logo.png"
  android: true
  ios: true
  web: false
